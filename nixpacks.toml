# Nixpacks fallback — use Railway Dockerfile builder when possible (see railway.toml).
# Python provider includes pip; never use ensurepip on Nix.

providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.12"

[phases.install]
cmds = [
  "python -m pip install --upgrade pip setuptools wheel",
  "python -m pip install \".[api]\"",
]

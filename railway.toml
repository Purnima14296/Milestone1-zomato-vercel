[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Start via Dockerfile CMD → scripts/railway_start.sh (binds 0.0.0.0:$PORT).
# Do not set startCommand here or in the Railway UI — bare $PORT breaks without a shell.
healthcheckPath = "/api/health"
# Seconds to wait for /api/health to return 200 (app responds immediately; ingest runs in background).
healthcheckTimeout = 600
restartPolicyType = "on_failure"

# Railway config — https://docs.railway.com/reference/config-as-code
# Connect repo root; Nixpacks detects Python via runtime.txt + requirements.txt

[build]
buildCommand = "bash scripts/railway_build.sh"

[deploy]
startCommand = "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

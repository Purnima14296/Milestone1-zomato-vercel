[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Start via Dockerfile CMD (sh -c expands ${PORT}). Do not set --port $PORT here;
# Railway runs startCommand without a shell, so $PORT would be passed literally.
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
